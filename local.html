<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gender Reveal ✨</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #2a1060 0%, #0d1b3e 55%, #060d1f 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden; user-select: none;
    }

    /* Stars */
    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; background: #fff; border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: .15; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.6); }
    }

    /* All screens hidden by default */
    .screen { display: none; position: relative; z-index: 1; text-align: center; padding: 1.5rem; width: 100%; max-width: 720px; }

    .title {
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: #fff; text-shadow: 0 0 30px rgba(255,255,255,.4);
      letter-spacing: .1em; margin-bottom: .4rem;
    }
    .sub {
      color: rgba(255,255,255,.55); font-size: clamp(.85rem, 2.5vw, 1rem);
      letter-spacing: .04em; margin-bottom: 2rem;
    }

    /* ── Pick screen ── */
    .gender-buttons { display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap; }
    .gbtn {
      padding: 1rem 2.5rem; border: none; border-radius: 50px;
      font-size: clamp(1rem, 3vw, 1.2rem); cursor: pointer;
      font-family: 'Georgia', serif; letter-spacing: .04em;
      transition: transform .2s, box-shadow .2s;
      text-decoration: none; display: inline-block;
    }
    .gbtn:hover { transform: scale(1.07); }
    .gbtn.boy  { background: linear-gradient(135deg,#29b6f6,#0277bd); color:#fff; box-shadow:0 4px 20px rgba(41,182,246,.45); }
    .gbtn.girl { background: linear-gradient(135deg,#f48fb1,#ad1457); color:#fff; box-shadow:0 4px 20px rgba(240,98,146,.45); }

    /* ── Game screen ── */
    #gameScreen {
      height: 100%;
      max-width: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 4vh, 3rem) clamp(1.5rem, 4vw, 3rem);
    }

    #subtitleText {
      color: rgba(255,255,255,.6); font-size: clamp(.85rem, 2.5vw, 1.05rem);
      letter-spacing: .04em; margin-bottom: clamp(1rem, 3vh, 1.8rem); min-height: 1.4em;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows:    repeat(3, 1fr);
      gap: clamp(8px, 1.5vw, 20px);
      width: min(88vw, 60vh);
      max-width: 680px;
      aspect-ratio: 1;
      margin: 0 auto;
    }

    /* ── Box / flip card ── */
    .box { width: 100%; aspect-ratio: 1; perspective: 700px; cursor: pointer; }
    .box-inner {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform .7s cubic-bezier(.34,1.56,.64,1);
    }
    .box.revealed .box-inner { transform: rotateY(180deg); }
    .box-front, .box-back {
      position: absolute; inset: 0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backface-visibility: hidden;
      font-size: clamp(1.8rem, min(5.5vw, 7vh), 4rem);
    }
    .box-front {
      background: linear-gradient(145deg,#1e2d6e,#0e1a40);
      box-shadow:
        0 0 0 3px rgba(175,150,60,0.72),
        0 0 0 5px rgba(55,40,5,0.48),
        inset 0 2px 6px rgba(255,255,255,.18),
        inset 0 -1px 4px rgba(0,0,0,.32),
        0 8px 28px rgba(0,0,0,.4);
      color: rgba(255,255,255,.6);
      transition: box-shadow .2s, transform .15s;
    }
    .box:not(.revealed):hover .box-front {
      box-shadow:
        0 0 0 4px rgba(220,195,90,0.92),
        0 0 0 6px rgba(55,40,5,0.55),
        inset 0 2px 6px rgba(255,255,255,.26),
        inset 0 -1px 4px rgba(0,0,0,.32),
        0 10px 36px rgba(0,0,0,.4), 0 0 18px rgba(255,255,255,.12);
      transform: scale(1.06);
    }
    .box-back { transform: rotateY(180deg); }
    .box-back.blue {
      background: linear-gradient(135deg,#4fc3f7,#0288d1);
      box-shadow:
        0 0 0 3px rgba(100,215,255,0.82),
        0 0 0 5px rgba(0,65,125,0.48),
        inset 0 2px 6px rgba(255,255,255,.3),
        inset 0 -1px 4px rgba(0,0,0,.2),
        0 8px 28px rgba(41,182,246,.5);
      color: #fff;
    }
    .box-back.pink {
      background: linear-gradient(135deg,#f48fb1,#c2185b);
      box-shadow:
        0 0 0 3px rgba(248,170,205,0.82),
        0 0 0 5px rgba(105,5,48,0.48),
        inset 0 2px 6px rgba(255,255,255,.3),
        inset 0 -1px 4px rgba(0,0,0,.2),
        0 8px 28px rgba(240,98,146,.5);
      color: #fff;
    }

    .box.last-glow .box-front { animation: lastPulse .9s ease-in-out infinite; }
    @keyframes lastPulse {
      0%,100% {
        box-shadow: 0 0 0 3px rgba(175,150,60,0.72), 0 0 0 5px rgba(55,40,5,0.48),
                    inset 0 2px 6px rgba(255,255,255,.18), 0 0 14px rgba(255,255,255,.3), 0 8px 28px rgba(0,0,0,.35);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 0 5px rgba(255,230,100,1), 0 0 0 8px rgba(55,40,5,0.55),
                    inset 0 2px 6px rgba(255,255,255,.28), 0 0 50px rgba(255,255,255,.85), 0 0 90px rgba(255,255,255,.35);
        transform: scale(1.12);
      }
    }

    /* ── Heartbeat animations ── */
    .box.hb-blue.revealed .box-back  { animation: hbBlue 0.85s ease-in-out infinite; }
    .box.hb-pink.revealed .box-back  { animation: hbPink 0.85s ease-in-out infinite; }
    .box.hb-blue.intensified.revealed .box-back { animation: hbBlue 0.42s ease-in-out infinite; }
    .box.hb-pink.intensified.revealed .box-back { animation: hbPink 0.42s ease-in-out infinite; }

    @keyframes hbBlue {
      0%,100% { transform: rotateY(180deg) scale(1);    box-shadow: 0 0 0 3px rgba(100,215,255,.82), 0 0 0 5px rgba(0,65,125,.48), inset 0 2px 6px rgba(255,255,255,.3), 0 8px 28px rgba(41,182,246,.5); }
      14%     { transform: rotateY(180deg) scale(1.14); box-shadow: 0 0 0 4px rgba(100,215,255,1),   0 0 0 7px rgba(0,65,125,.62), inset 0 2px 6px rgba(255,255,255,.4), 0 0 60px rgba(41,182,246,1), 0 0 100px rgba(41,182,246,.4); }
      28%     { transform: rotateY(180deg) scale(1.02); box-shadow: 0 0 0 3px rgba(100,215,255,.82), 0 0 0 5px rgba(0,65,125,.48), inset 0 2px 6px rgba(255,255,255,.3), 0 8px 28px rgba(41,182,246,.6); }
      42%     { transform: rotateY(180deg) scale(1.08); box-shadow: 0 0 0 4px rgba(100,215,255,.92), 0 0 0 6px rgba(0,65,125,.55), inset 0 2px 6px rgba(255,255,255,.35), 0 0 40px rgba(41,182,246,.8); }
      70%     { transform: rotateY(180deg) scale(1); }
    }
    @keyframes hbPink {
      0%,100% { transform: rotateY(180deg) scale(1);    box-shadow: 0 0 0 3px rgba(248,170,205,.82), 0 0 0 5px rgba(105,5,48,.48), inset 0 2px 6px rgba(255,255,255,.3), 0 8px 28px rgba(240,98,146,.5); }
      14%     { transform: rotateY(180deg) scale(1.14); box-shadow: 0 0 0 4px rgba(248,170,205,1),   0 0 0 7px rgba(105,5,48,.62), inset 0 2px 6px rgba(255,255,255,.4), 0 0 60px rgba(240,98,146,1), 0 0 100px rgba(240,98,146,.4); }
      28%     { transform: rotateY(180deg) scale(1.02); box-shadow: 0 0 0 3px rgba(248,170,205,.82), 0 0 0 5px rgba(105,5,48,.48), inset 0 2px 6px rgba(255,255,255,.3), 0 8px 28px rgba(240,98,146,.6); }
      42%     { transform: rotateY(180deg) scale(1.08); box-shadow: 0 0 0 4px rgba(248,170,205,.92), 0 0 0 6px rgba(105,5,48,.55), inset 0 2px 6px rgba(255,255,255,.35), 0 0 40px rgba(240,98,146,.8); }
      70%     { transform: rotateY(180deg) scale(1); }
    }

    /* ── Winner line flash ── */
    .box.winner .box-back {
      animation: winnerPop 0.55s cubic-bezier(.34,1.56,.64,1) forwards,
                 winnerGlow 0.9s ease-in-out infinite 0.55s !important;
    }
    @keyframes winnerPop {
      0%   { transform: rotateY(180deg) scale(1); filter: brightness(1); }
      55%  { transform: rotateY(180deg) scale(1.28); filter: brightness(1.7); }
      100% { transform: rotateY(180deg) scale(1.15); filter: brightness(1.35); }
    }
    @keyframes winnerGlow {
      0%,100% { filter: brightness(1.35); }
      50%     { filter: brightness(1.75) drop-shadow(0 0 25px white); }
    }

    #statusText { margin-top: clamp(.9rem,2.5vh,1.4rem); color: rgba(255,255,255,.45); font-size: clamp(.72rem,2vw,.84rem); letter-spacing: .13em; text-transform: uppercase; }
    #hintText   { margin-top: .4rem; color: rgba(255,255,255,.28); font-size: clamp(.68rem,2vw,.76rem); font-style: italic; }

    /* ── Celebration ── */
    #celebration {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity .6s ease;
    }
    #celebration.active { opacity: 1; pointer-events: all; }
    #celebration.boy  { background: radial-gradient(ellipse at center, rgba(41,182,246,.97) 0%, rgba(1,60,120,.99) 100%); }
    #celebration.girl { background: radial-gradient(ellipse at center, rgba(240,98,146,.97) 0%, rgba(100,0,60,.99) 100%); }
    .cel-emoji   { font-size: clamp(4rem,12vw,7rem); animation: popIn .6s cubic-bezier(.34,1.56,.64,1) .3s both; }
    .cel-text    { font-size: clamp(2.2rem,8vw,5rem); color:#fff; font-weight:bold; letter-spacing:.06em; text-shadow:0 4px 30px rgba(0,0,0,.3); animation:popIn .6s cubic-bezier(.34,1.56,.64,1) .5s both; }
    .cel-sub     { color:rgba(255,255,255,.85); font-size:clamp(1rem,3vw,1.3rem); margin-top:.8rem; animation:popIn .6s cubic-bezier(.34,1.56,.64,1) .75s both; }
    .cel-restart { margin-top:2rem; padding:.7rem 2rem; border:2px solid rgba(255,255,255,.6); border-radius:50px; background:transparent; color:#fff; font-size:1rem; font-family:'Georgia',serif; cursor:pointer; letter-spacing:.06em; transition:background .2s,transform .2s; animation:popIn .6s cubic-bezier(.34,1.56,.64,1) 1s both; }
    .cel-restart:hover { background:rgba(255,255,255,.15); transform:scale(1.05); }
    @keyframes popIn { from{opacity:0;transform:scale(.2) rotate(-8deg)} to{opacity:1;transform:scale(1) rotate(0)} }

    #confettiCanvas { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:201; }

    /* ── TV / large screen overrides (1280px+) ── */
    @media (min-width: 1280px) {
      .title        { font-size: 3.6rem; letter-spacing: .14em; }
      .sub          { font-size: 1.15rem; margin-bottom: 2.4rem; }
      .gbtn         { font-size: 1.4rem; padding: 1.2rem 3rem; }
      .screen       { max-width: 960px; padding: 2.5rem; }
      #subtitleText { font-size: 1.3rem; margin-bottom: 2.2rem; }
      #statusText   { font-size: 1rem;   letter-spacing: .16em; margin-top: 1.6rem; }
      #hintText     { font-size: .92rem; margin-top: .5rem; }
      .cel-emoji    { font-size: 9rem; }
      .cel-text     { font-size: 6.5rem; }
      .cel-sub      { font-size: 1.6rem; }
    }

    /* ── 4K / very large TVs (1920px+) ── */
    @media (min-width: 1920px) {
      .title        { font-size: 5rem; }
      .sub          { font-size: 1.4rem; }
      .screen       { max-width: 1200px; }
      #subtitleText { font-size: 1.6rem; }
      #statusText   { font-size: 1.2rem; margin-top: 2rem; }
      #hintText     { font-size: 1.1rem; }
      .cel-emoji    { font-size: 12rem; }
      .cel-text     { font-size: 9rem; }
      .cel-sub      { font-size: 2rem; }
    }
  </style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>
<div id="stars"></div>

<!-- 1. Pick Screen -->
<div class="screen" id="pickScreen">
  <div class="title">✨ Gender Reveal ✨</div>
  <p class="sub">Select the baby's gender to start the game</p>
  <div class="gender-buttons">
    <a class="gbtn boy"  href="?type=2">👦 &nbsp;Boy</a>
    <a class="gbtn girl" href="?type=1">👧 &nbsp;Girl</a>
  </div>
</div>

<!-- 2. Game Screen -->
<div class="screen" id="gameScreen">
  <div class="title">✨ Gender Reveal ✨</div>
  <div id="subtitleText">Waiting for the first box to be revealed…</div>
  <div class="grid" id="grid"></div>
  <div id="statusText">9 boxes remaining</div>
  <div id="hintText">The gender is hidden until the very last box!</div>
</div>

<!-- 3. Celebration -->
<div id="celebration">
  <div class="cel-emoji" id="celEmoji"></div>
  <div class="cel-text"  id="celText"></div>
  <div class="cel-sub">Congratulations! 🎉</div>
  <button class="cel-restart" onclick="newGame()">New Game</button>
</div>

<script>
// ─── Stars ───────────────────────────────────────────────
(function () {
  const c = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + .8;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:-${(Math.random()*5).toFixed(1)}s`;
    c.appendChild(s);
  }
})();

// ─── State ───────────────────────────────────────────────
let gender = null, actualColor = null;
let boxColors = new Array(9).fill(null);
let revealedCount = 0;
let celebrationShown = false;
let audioCtx = null;

// ─── Game start ───────────────────────────────────────────
function startGame(g) {
  gender = g;
  actualColor = gender === 'boy' ? 'blue' : 'pink';
  show('gameScreen');
  buildGrid();
  updateMessages();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const box = document.createElement('div');
    box.className = 'box'; box.dataset.index = i;
    box.innerHTML = `<div class="box-inner"><div class="box-front">❓</div><div class="box-back" id="back-${i}"></div></div>`;
    box.addEventListener('click', () => handleClick(i));
    grid.appendChild(box);
  }
}

// ════════════════════════════════════════════════════════════
//  Color-Picking Algorithm
// ════════════════════════════════════════════════════════════

const WIN_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function pickDrawColor(index) {
  const other = actualColor === 'blue' ? 'pink' : 'blue';
  if (index === 0 || index === 4) return actualColor;
  if (index === 2 || index === 5) return other;
  const fullState = [...boxColors];
  if (fullState[0] === null) fullState[0] = actualColor;
  if (fullState[4] === null) fullState[4] = actualColor;
  if (fullState[2] === null) fullState[2] = other;
  if (fullState[5] === null) fullState[5] = other;
  const blues = fullState.filter(c => c === 'blue').length;
  const pinks = fullState.filter(c => c === 'pink').length;
  const order = blues <= pinks ? ['blue','pink'] : ['pink','blue'];
  for (const color of order) {
    const test = [...fullState]; test[index] = color;
    if (!WIN_LINES.some(l => l.includes(index) && l.every(i => test[i] === color))) {
      return color;
    }
  }
  return blues <= pinks ? 'blue' : 'pink';
}

// ════════════════════════════════════════════════════════════
//  Coin-Flip Reveal Animation
// ════════════════════════════════════════════════════════════

const currentlySpinning = new Set();

function spinReveal(index, color, isLast) {
  return new Promise(resolve => {
    const box = document.querySelector(`.box[data-index="${index}"]`);
    const inner = box.querySelector('.box-inner');
    const back  = document.getElementById(`back-${index}`);
    const front = box.querySelector('.box-front');
    if (!box || box.classList.contains('revealed') || currentlySpinning.has(index)) { resolve(); return; }
    currentlySpinning.add(index);
    box.style.pointerEvents = 'none';

    const alt      = color === 'blue' ? 'pink' : 'blue';
    const altBg    = alt === 'blue' ? 'linear-gradient(135deg,#4fc3f7,#0288d1)' : 'linear-gradient(135deg,#f48fb1,#c2185b)';
    const altEmoji = alt === 'blue' ? '👦' : '👧';

    const savedFrontText = front.textContent;
    const savedFrontBg   = front.style.background;
    const savedFrontClr  = front.style.color;
    front.textContent      = altEmoji;
    front.style.background = altBg;
    front.style.color      = '#fff';

    const durations = isLast
      ? [22,27,31,36,41,47,54,62,72,82,95,109,125,144,166,190,219,252,406,466,536,616,708,818,938]
      : [120,130,140,150,170,190,380];

    back.className = `box-back ${alt}`;
    back.textContent = altEmoji;

    const totalBackShows = Math.ceil(durations.length / 2);
    let angle = 0, backCount = 0;

    function doStep(i) {
      const dur = durations[i];
      const isLastStep = i === durations.length - 1;
      angle += 180;

      if ((angle / 180) % 2 === 1) {
        const c = isLastStep                              ? color
                : (isLast && backCount === totalBackShows - 2) ? alt
                : backCount % 2 === 0                    ? alt
                :                                          color;
        back.className   = `box-back ${c}`;
        back.textContent = c === 'blue' ? '👦' : '👧';
        backCount++;
      }

      const easing = isLastStep
        ? (isLast ? 'ease-out' : 'cubic-bezier(0.34,1.56,0.64,1)')
        : (isLast && i >= durations.length - 6 ? 'ease-out' : 'ease-in-out');

      const tiltX = isLast
        ? -(12 - 8 * (i / (durations.length - 1)))
        : -8;

      inner.style.transition = `transform ${dur}ms ${easing}`;
      inner.style.transform  = `rotateX(${tiltX.toFixed(1)}deg) rotateY(${angle}deg)`;

      if (!isLastStep) {
        setTimeout(() => doStep(i + 1), dur);
      } else {
        setTimeout(() => {
          const settleDur = isLast ? 420 : 200;
          inner.style.transition = `transform ${settleDur}ms ease-out`;
          inner.style.transform  = 'rotateY(180deg)';
          setTimeout(() => {
            inner.style.transition = 'none';
            front.textContent      = savedFrontText;
            front.style.background = savedFrontBg;
            front.style.color      = savedFrontClr;
            box.classList.add('revealed');
            box.style.pointerEvents = '';
            currentlySpinning.delete(index);
            resolve();
          }, settleDur + 30);
        }, dur + 30);
      }
    }

    doStep(0);
  });
}

// ════════════════════════════════════════════════════════════
//  Heartbeat + Winner Line Flash
// ════════════════════════════════════════════════════════════

let heartbeatTimer = null;

function playThump(volume = 0.4) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(75, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(38, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.22);
  } catch(e) {}
}

function startHeartbeat(fast = false) {
  stopHeartbeat();
  const interval = fast ? 650 : 1000;
  const vol = fast ? 0.55 : 0.35;
  function beat() {
    playThump(vol);
    setTimeout(() => playThump(vol * 0.8), fast ? 200 : 280);
  }
  beat();
  heartbeatTimer = setInterval(beat, interval);
}

function stopHeartbeat() {
  if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
}

function triggerHeartbeat() {
  const other = actualColor === 'blue' ? 'pink' : 'blue';
  const actClass   = actualColor === 'blue' ? 'hb-blue' : 'hb-pink';
  const otherClass = other === 'blue'       ? 'hb-blue' : 'hb-pink';
  [0, 4].forEach(i => {
    const el = document.querySelector(`.box[data-index="${i}"]`);
    if (el) el.classList.add(actClass);
  });
  [2, 5].forEach(i => {
    const el = document.querySelector(`.box[data-index="${i}"]`);
    if (el) el.classList.add(otherClass);
  });
  startHeartbeat(false);
}

function flashWinnerLine(lastIdx) {
  WIN_LINES.forEach(line => {
    if (!line.includes(lastIdx)) return;
    if (line.every(i => boxColors[i] === actualColor)) {
      line.forEach((i, pos) => {
        setTimeout(() => {
          const el = document.querySelector(`.box[data-index="${i}"]`);
          if (el) el.classList.add('winner');
        }, pos * 80);
      });
    }
  });
}

// ─── Messages ────────────────────────────────────────────
const MSGS = [
  'Waiting for the first box to be revealed…',
  'Hmm… interesting. Keep going!',
  'Could be either way… 🤔',
  'Ooh! The suspense is real… ✨',
  "Still anyone's guess… 👀",
  'Getting warmer… or are we? 🔥',
  'Almost there… heart racing? 💓',
  'Just one more…',
  '⭐ ONE BOX REMAINS ⭐ — The moment of truth!',
  '🎉 The gender has been revealed!',
];
function updateMessages() {
  document.getElementById('subtitleText').textContent = MSGS[Math.min(revealedCount, 9)];
  const left = 9 - revealedCount;
  document.getElementById('statusText').textContent = left > 0 ? `${left} box${left!==1?'es':''} remaining` : '';
  if (revealedCount === 8) document.getElementById('hintText').textContent = 'Click the last box to reveal the gender!';
}

// ─── Click handler ────────────────────────────────────────
function handleClick(index) {
  if (boxColors[index] !== null || celebrationShown) return;
  if (index === 8 && revealedCount < 8) return;

  const color  = index === 8 ? actualColor : pickDrawColor(index);
  const isLast = index === 8;
  boxColors[index] = color;
  revealedCount++;

  if (isLast) {
    celebrationShown = true;
    document.querySelectorAll('.hb-blue, .hb-pink').forEach(el => el.classList.add('intensified'));
    stopHeartbeat();
    startHeartbeat(true);
    setTimeout(async () => {
      await spinReveal(index, color, true);
      stopHeartbeat();
      flashWinnerLine(index);
      setTimeout(() => {
        playFanfare();
        setTimeout(showCelebration, 600);
      }, 600);
    }, 700);
  } else {
    spinReveal(index, color, false).then(() => playChime(color === 'blue'));
    updateMessages();
    if (revealedCount === 8) {
      setTimeout(() => {
        const lastIdx = boxColors.indexOf(null);
        if (lastIdx !== -1) {
          document.querySelector(`.box[data-index="${lastIdx}"]`).classList.add('last-glow');
          triggerHeartbeat();
        }
      }, 600);
    }
  }
}

// ─── Celebration ─────────────────────────────────────────
function showCelebration() {
  const isBoy = gender === 'boy';
  const el = document.getElementById('celebration');
  el.className = `active ${isBoy ? 'boy' : 'girl'}`;
  document.getElementById('celEmoji').textContent = isBoy ? '👶💙' : '👶💗';
  document.getElementById('celText').textContent  = isBoy ? "IT'S A BOY!" : "IT'S A GIRL!";
  launchConfetti(isBoy);
}

function newGame() { location.reload(); }

// ─── Audio ────────────────────────────────────────────────
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playChime(isBlue) {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const freqs = isBlue ? [659.25, 880, 1046.5] : [587.33, 783.99, 987.77];
    freqs.forEach((f, i) => {
      const t = now + i * 0.07;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = f;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.18, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.9);
      const osc2 = ctx.createOscillator(), g2 = ctx.createGain();
      osc2.type = 'triangle'; osc2.frequency.value = f * 2;
      g2.gain.setValueAtTime(0, t);
      g2.gain.linearRampToValueAtTime(0.06, t + 0.01);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
      osc2.connect(g2); g2.connect(ctx.destination);
      osc2.start(t); osc2.stop(t + 0.38);
    });
  } catch(e) {}
}

function playFanfare() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    // Shared noise buffer
    const noiseBuf = (() => {
      const len = ctx.sampleRate * 4;
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      return buf;
    })();

    function noise(t, decay, filtType, filtFreq, filtQ, vol) {
      const src = ctx.createBufferSource();
      src.buffer = noiseBuf;
      const filt = ctx.createBiquadFilter();
      filt.type = filtType; filt.frequency.value = filtFreq; filt.Q.value = filtQ;
      const g = ctx.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + decay);
      src.connect(filt); filt.connect(g); g.connect(ctx.destination);
      src.start(t); src.stop(t + decay + 0.01);
    }

    // Bass drum
    function kick(t, vol = 0.85) {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(140, t);
      osc.frequency.exponentialRampToValueAtTime(48, t + 0.08);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.26);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.27);
      noise(t, 0.04, 'bandpass', 200, 1.2, vol * 0.35);
    }

    // Snare
    function snare(t, vol = 0.44) {
      noise(t, 0.19, 'bandpass', 1600, 0.75, vol);
      noise(t, 0.06, 'highpass', 3500, 1.0,  vol * 0.5);
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'triangle'; osc.frequency.value = 185;
      g.gain.setValueAtTime(vol * 0.4, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.08);
    }

    // Clap
    function clap(t, vol = 0.4) {
      noise(t,        0.015, 'bandpass', 1100, 0.5, vol * 0.7);
      noise(t + 0.01, 0.13,  'bandpass', 1200, 0.5, vol);
    }

    // Closed hi-hat
    function hihat(t, vol = 0.17) {
      noise(t, 0.042, 'highpass', 9500, 1.2, vol);
    }

    // Open hi-hat
    function openhat(t, vol = 0.14) {
      noise(t, 0.28, 'highpass', 8500, 0.8, vol);
    }

    // Tambourine
    function tamb(t, vol = 0.13) {
      noise(t, 0.09, 'bandpass', 5500, 2.2, vol);
    }

    // Cymbal crash
    function cymbal(t, decay = 3.0, vol = 0.26) {
      noise(t, decay,       'highpass', 6500, 0.5, vol);
      noise(t, decay * 0.4, 'bandpass', 9000, 1.5, vol * 0.4);
    }

    // Confetti cannon pop — sharp bandpass burst, like a party popper
    function pop(t, freq = 1600, vol = 0.52) {
      noise(t,        0.06, 'bandpass', freq,       0.6, vol);
      noise(t + 0.01, 0.10, 'bandpass', freq * 1.4, 0.8, vol * 0.6);
      noise(t + 0.02, 0.14, 'highpass', freq * 2,   1.0, vol * 0.35);
    }

    // ── Sequence at 128 BPM ────────────────────────────────
    const B = 0.469;   // quarter note
    const E = B / 2;   // 8th note
    const S = E / 2;   // 16th note

    // Opening salvo — 5 rapid confetti pops + crash cymbal
    pop(now,        1200, 0.58);
    pop(now + 0.06, 1700, 0.52);
    pop(now + 0.13, 2300, 0.46);
    pop(now + 0.21, 2900, 0.40);
    pop(now + 0.30, 3600, 0.34);
    cymbal(now + 0.02, 3.8, 0.30);

    // ── Bar 1 ──────────────────────────────────────────────
    kick(now);
    hihat(now + S);
    hihat(now + E);
    snare(now + E * 2); clap(now + E * 2);
    hihat(now + E * 2 + S); tamb(now + E * 2 + S);
    hihat(now + E * 3);
    kick(now + E * 4);
    hihat(now + E * 4 + S);
    hihat(now + E * 5); tamb(now + E * 5);
    snare(now + E * 6); clap(now + E * 6);
    openhat(now + E * 6);
    hihat(now + E * 6 + S);
    tamb(now + E * 7);

    // ── Bar 2 ──────────────────────────────────────────────
    const b2 = now + B * 4;
    kick(b2);
    hihat(b2 + S);
    hihat(b2 + E);
    snare(b2 + E * 2); clap(b2 + E * 2);
    hihat(b2 + E * 2 + S);
    hihat(b2 + E * 3); kick(b2 + E * 3, 0.52);   // syncopated kick
    kick(b2 + E * 4);
    hihat(b2 + E * 4 + S);
    hihat(b2 + E * 5); tamb(b2 + E * 5);
    snare(b2 + E * 6); clap(b2 + E * 6);
    openhat(b2 + E * 6);
    tamb(b2 + E * 7);

    // ── Mid-point confetti burst ───────────────────────────
    pop(b2 + B * 3,        1400, 0.48);
    pop(b2 + B * 3 + 0.07, 2100, 0.42);
    pop(b2 + B * 3 + 0.15, 2900, 0.36);

    // ── Fill — rapid 16th kick + snare rolls ──────────────
    const fl = now + B * 8;
    kick(fl,           0.80); hihat(fl);
    kick(fl + S,       0.65);
    kick(fl + E,       0.72); hihat(fl + E);
    snare(fl + E + S,  0.38);
    kick(fl + E * 2,   0.78); hihat(fl + E * 2);
    snare(fl + E * 2 + S, 0.42); clap(fl + E * 2 + S);

    // ── Final accent — big hit + confetti shower ───────────
    const fin = now + B * 9;
    kick(fin, 1.0);
    snare(fin, 0.55); clap(fin, 0.52);
    cymbal(fin, 3.2, 0.28);
    // Confetti volley — 6 pops spread across 400ms
    pop(fin,        1200, 0.56);
    pop(fin + 0.07, 1800, 0.50);
    pop(fin + 0.15, 2500, 0.44);
    pop(fin + 0.24, 3200, 0.38);
    pop(fin + 0.34, 4000, 0.32);
    pop(fin + 0.45, 5000, 0.26);

  } catch(e) {}
}

// ─── Confetti ─────────────────────────────────────────────
let confettiId=null, parts=[];

function mkParticle(pal) {
  return {
    x: Math.random()*innerWidth, y: -20,
    r: Math.random()*7+3, d: Math.random()*200,
    tilt: 0, tiltAngle: Math.random()*Math.PI*2,
    ts: Math.random()*.07+.03,
    c: pal[Math.floor(Math.random()*pal.length)],
    o: Math.random()*.4+.6,
    s: ['circle','rect','diamond'][Math.floor(Math.random()*3)]
  };
}

function mkBalloon(pal) {
  return {
    x: Math.random()*innerWidth, y: innerHeight + 30,
    r: 7.5, ry: 12.5, d: Math.random()*200,
    tiltAngle: Math.random()*Math.PI*2,
    ts: Math.random()*.025+.01,
    vy: -(Math.random()*1.2+0.6),
    c: pal[Math.floor(Math.random()*pal.length)],
    o: Math.random()*.35+.65,
    s: 'balloon'
  };
}

function launchConfetti(isBoy) {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width=innerWidth; canvas.height=innerHeight;
  const pal = isBoy
    ? ['#29b6f6','#4fc3f7','#81d4fa','#fff','#b3e5fc','#0288d1']
    : ['#f06292','#f48fb1','#fce4ec','#fff','#f8bbd0','#c2185b'];
  parts = Array.from({length:220}, () => mkParticle(pal)).concat(
          Array.from({length:30},  () => mkBalloon(pal)));
  let angle = 0;
  const draw = () => {
    ctx.clearRect(0,0,canvas.width,canvas.height); angle+=.012;
    parts.forEach((p, idx) => {
      if (p.s === 'balloon') {
        p.tiltAngle += p.ts; p.y += p.vy; p.x += Math.sin(angle + p.d) * 0.7;
        ctx.save(); ctx.globalAlpha=p.o; ctx.fillStyle=p.c;
        ctx.translate(p.x,p.y); ctx.rotate(p.tiltAngle*0.1);
        ctx.beginPath(); ctx.ellipse(0,0,p.r,p.ry,0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle=p.c; ctx.globalAlpha=p.o*0.5; ctx.lineWidth=0.8;
        ctx.beginPath(); ctx.moveTo(0,p.ry); ctx.lineTo(0,p.ry+8); ctx.stroke();
        ctx.restore();
        if (p.y < -50) parts[idx] = mkBalloon(pal);
      } else {
        p.tiltAngle+=p.ts; p.y+=Math.cos(angle+p.d)*1.8+.8+p.r/3; p.x+=Math.sin(angle)*1.6; p.tilt=Math.sin(p.tiltAngle)*14;
        ctx.save(); ctx.globalAlpha=p.o; ctx.fillStyle=p.c;
        if(p.s==='circle'){ctx.beginPath();ctx.arc(p.x+p.tilt,p.y,p.r,0,Math.PI*2);ctx.fill();}
        else if(p.s==='rect'){ctx.translate(p.x+p.tilt,p.y);ctx.rotate(p.tiltAngle);ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}
        else{ctx.translate(p.x+p.tilt,p.y);ctx.rotate(p.tiltAngle);ctx.beginPath();ctx.moveTo(0,-p.r);ctx.lineTo(p.r*.6,0);ctx.lineTo(0,p.r);ctx.lineTo(-p.r*.6,0);ctx.closePath();ctx.fill();}
        ctx.restore();
        if(p.y>canvas.height+20) parts[idx]=mkParticle(pal);
      }
    });
    confettiId=requestAnimationFrame(draw);
  };
  draw(); setTimeout(stopConfetti, 9000);
}

function stopConfetti(){if(confettiId)cancelAnimationFrame(confettiId);confettiId=null;const c=document.getElementById('confettiCanvas');c.getContext('2d').clearRect(0,0,c.width,c.height);}
window.addEventListener('resize',()=>{const c=document.getElementById('confettiCanvas');c.width=innerWidth;c.height=innerHeight;});

// ─── Helpers ─────────────────────────────────────────────
function show(id) {
  ['pickScreen','gameScreen'].forEach(s => {
    document.getElementById(s).style.display = s !== id ? 'none' : s === 'gameScreen' ? 'flex' : 'block';
  });
}

// ─── Boot ────────────────────────────────────────────────
function init() {
  const type = new URLSearchParams(location.search).get('type');
  if (type === '1') { startGame('girl'); return; }
  if (type === '2') { startGame('boy');  return; }
  show('pickScreen');
}
init();
